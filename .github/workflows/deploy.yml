name: CI/CD Laravel Docker

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: TESTING (dengan build asset Vite)
  # ─────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, bcmath, mbstring, xml, curl, zip

      # Install Composer dependencies
      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      # ========== PERBAIKAN: Build asset Vite ==========
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build Vite assets (CSS & JS)
        run: npm run build
      # =================================================

      # Persiapan environment testing
      - name: Copy .env example
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      # Create database for testing (SQLite memory)
      - name: Touch database file
        run: touch database/database.sqlite

      - name: Run migrations
        run: php artisan migrate --force --no-interaction

      # Jalankan PHPUnit
      - name: Run PHPUnit tests
        run: php artisan test

  # ─────────────────────────────────────────────────────────────
  # JOB 2: BUILD & PUSH DOCKER IMAGE
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test  # Hanya jalan jika test sukses

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # JOB 3: DEPLOY KE VPS (melalui SSH)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: success()  # Hanya deploy jika semua job sebelumnya sukses

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}  # default 22, bisa diatur
          script: |
            set -e

            echo "🚀 Memulai deployment ke VPS..."

            # Login ke GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Masuk ke direktori project (sesuaikan)
            cd /home/${{ secrets.SERVER_USER }}/RPL2X-kelompok-1

            # Pull image terbaru
            docker pull ghcr.io/${{ github.repository }}:latest

            # Update container dengan docker compose
            docker compose up -d --remove-orphans

            # Tunggu container siap
            echo "⏳ Menunggu container siap (10 detik)..."
            sleep 10

            # Jalankan migrasi database di dalam container
            docker compose exec -T app php artisan migrate --force --no-interaction

            # (Opsional) Clear cache
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan route:cache
            docker compose exec -T app php artisan view:cache

            echo "✅ Deployment selesai!"